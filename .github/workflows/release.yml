name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.release_meta.outputs.version }}
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && github.event.head_commit != null
      && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Private half of the repo Deploy key (Settings → Deploy keys). Must allow write access.
      # Add repository secret RELEASE_DEPLOY_KEY with the full PEM (BEGIN/END lines included).
      - name: SSH agent (deploy key)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Trust GitHub SSH host key
        run: mkdir -p ~/.ssh && ssh-keyscan -t ed25519,rsa,ecdsa github.com >> ~/.ssh/known_hosts

      - name: Use SSH for git push
        run: git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync dependencies (incl. commitizen)
        run: uv sync --group dev --python 3.12

      - name: Bump version, changelog, and tag
        id: bump
        run: |
          set -euo pipefail
          git fetch origin --tags

          # Dry-run first so we can fail before mutating the tree if the release
          # tag already exists (avoids a release commit with no tag; exit 7).
          set +e
          DRY_OUT=$(uv run cz bump --dry-run 2>&1)
          DRY_CODE=$?
          set -e
          if [ "$DRY_CODE" -eq 3 ] || [ "$DRY_CODE" -eq 21 ]; then
            echo "$DRY_OUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$DRY_CODE" -ne 0 ]; then
            echo "$DRY_OUT"
            exit "$DRY_CODE"
          fi

          set +e
          NEXT_TAG=$(printf '%s\n' "$DRY_OUT" | grep '^tag to create:' | head -1 | sed 's/^tag to create:[[:space:]]*//')
          _tag_parse=$?
          set -e
          if [ "$_tag_parse" -ne 0 ]; then
            NEXT_TAG=""
          fi
          if [ -n "$NEXT_TAG" ] && git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $NEXT_TAG already exists after fetching tags. Remove the orphaned tag on the remote (or fix history), then re-run."
            echo "Example: git push origin :refs/tags/$NEXT_TAG"
            exit 1
          fi

          set +e
          uv run cz bump --yes --changelog --no-verify
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 3 ] || [ "$code" -eq 21 ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No release: no new commits (exit 3), or commits are not bump-eligible types like feat/fix (exit 21, e.g. docs/ci/chore only). Skipping build and push."
          elif [ "$code" -eq 7 ]; then
            echo "::error::cz bump could not create the tag (exit 7). Another job may have created it, or the tag exists only on the remote — fetch tags and resolve duplicates."
            exit "$code"
          else
            exit "$code"
          fi

      - name: Prepare release notes
        id: release_meta
        if: steps.bump.outputs.bumped == 'true'
        run: |
          set -euo pipefail
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Commitizen range PREV..NEW = commits between tags (matches tag_format v$version).
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            PREV_VER="${PREV_TAG#v}"
            uv run cz changelog "${PREV_VER}..${VERSION}" --dry-run > release_notes.md
          else
            uv run cz changelog "${VERSION}" --dry-run > release_notes.md
          fi

      - name: Build sdist and wheel
        if: steps.bump.outputs.bumped == 'true'
        run: uv build

      # Only when cz bump exited 0: a release commit and vX.Y.Z tag exist locally.
      # Exit 3/21 never create a tag, so this step is skipped — no tags pushed.
      - name: Push release commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin --tags

      - name: Create GitHub release
        if: steps.bump.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*

      - name: Upload build artifacts
        if: steps.bump.outputs.bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Releases created with GITHUB_TOKEN do not trigger other workflows' `on: release`
  # handlers, so PyPI publish must run in this workflow after the GitHub Release exists.
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/laughing-man
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
